<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayDraft</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c14;--surface:#0c1020;--card:#111625;--card-hover:#161c2e;
  --border:#1e2540;--border-hover:#2a3355;
  --accent:#2563eb;--accent-light:#93b4fd;
  --text:#e2e8f8;--text2:#8896b8;--muted:#3d4d70;
  --pro:#f59e0b;
  --study:#2563eb;--study-bg:#0c1530;--study-bd:#1a2d5a;--study-t:#93b4fd;
  --rest:#0d9488;--rest-bg:#051a18;--rest-bd:#0d3330;--rest-t:#5eead4;
  --work:#7c3aed;--work-bg:#120a28;--work-bd:#2a1660;--work-t:#c4b5fd;
  --chores:#d97706;--chores-bg:#1a1000;--chores-bd:#3d2800;--chores-t:#fbbf24;
  --other:#db2777;--other-bg:#1a0514;--other-bd:#40082a;--other-t:#f9a8d4;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:32px 28px 80px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.logo{font-family:'DM Serif Display',serif;font-size:1.75rem;color:var(--text)}
.tabs{display:flex;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px;gap:2px}
.tab{display:flex;align-items:center;gap:7px;padding:7px 16px;border-radius:7px;font-size:.85rem;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);font-family:'DM Sans',sans-serif;transition:all .15s}
.tab:hover{color:var(--text);background:var(--card-hover)}
.tab.active{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.pro-badge{background:rgba(245,158,11,.15);color:var(--pro);font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:4px;border:1px solid rgba(245,158,11,.3)}
.date-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.date-nav button{background:none;border:none;color:var(--text2);cursor:pointer;padding:6px 10px;border-radius:6px;font-size:1rem;transition:all .15s}
.date-nav button:hover{color:var(--text);background:var(--card)}
#dateLabel{font-size:1rem;color:var(--text);min-width:220px;text-align:center}
.legend{display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:7px;font-size:.75rem;color:var(--text2)}
.ld{width:7px;height:7px;border-radius:50%}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:32px}
.slot{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 14px;cursor:pointer;min-height:86px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden;transition:all .2s}
.slot:hover{background:var(--card-hover);border-color:var(--border-hover);transform:translateY(-2px)}
.slot:active{transform:none}
.sbar{position:absolute;top:0;left:0;right:0;height:2px;border-radius:14px 14px 0 0;opacity:0;transition:opacity .2s}
.slot.filled .sbar{opacity:1}
.slot.cat-study{border-color:var(--study-bd);background:var(--study-bg)}.slot.cat-study .sbar{background:var(--study)}
.slot.cat-rest{border-color:var(--rest-bd);background:var(--rest-bg)}.slot.cat-rest .sbar{background:var(--rest)}
.slot.cat-work{border-color:var(--work-bd);background:var(--work-bg)}.slot.cat-work .sbar{background:var(--work)}
.slot.cat-chores{border-color:var(--chores-bd);background:var(--chores-bg)}.slot.cat-chores .sbar{background:var(--chores)}
.slot.cat-other{border-color:var(--other-bd);background:var(--other-bg)}.slot.cat-other .sbar{background:var(--other)}
.stime{font-size:.72rem;font-weight:500;color:var(--text2)}
.spreview{font-size:.8rem;color:var(--text);line-height:1.5;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.stag{display:none;font-size:.62rem;font-weight:600;border-radius:4px;padding:2px 7px;align-self:flex-start;text-transform:uppercase}
.slot.cat-study .stag{display:inline;background:rgba(37,99,235,.2);color:var(--study-t)}
.slot.cat-rest .stag{display:inline;background:rgba(13,148,136,.2);color:var(--rest-t)}
.slot.cat-work .stag{display:inline;background:rgba(124,58,237,.2);color:var(--work-t)}
.slot.cat-chores .stag{display:inline;background:rgba(217,119,6,.2);color:var(--chores-t)}
.slot.cat-other .stag{display:inline;background:rgba(219,39,119,.2);color:var(--other-t)}
.bbar{display:flex;align-items:center;justify-content:space-between}
.scount{font-size:.8rem;color:var(--text2)}
.scount strong{color:var(--accent-light);font-weight:500}
.ebtn{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border-hover);color:var(--text2);border-radius:10px;padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s}
.ebtn:hover{border-color:var(--accent);color:var(--accent-light)}
#weeklyView{display:none}
.wgrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;margin-bottom:32px}
.wcol{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;min-height:180px}
.wcol.today{border-color:var(--accent)}
.wch{padding:14px 12px 10px;border-bottom:1px solid var(--border)}
.wdn{font-size:.7rem;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.wdd{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--text);line-height:1}
.wcol.today .wdn,.wcol.today .wdd{color:var(--accent-light)}
.wcb{padding:8px;display:flex;flex-direction:column;gap:4px}
.wtask{font-size:.72rem;padding:5px 8px;border-radius:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wtask.cat-study{background:rgba(37,99,235,.18);color:var(--study-t)}
.wtask.cat-rest{background:rgba(13,148,136,.18);color:var(--rest-t)}
.wtask.cat-work{background:rgba(124,58,237,.18);color:var(--work-t)}
.wtask.cat-chores{background:rgba(217,119,6,.18);color:var(--chores-t)}
.wtask.cat-other{background:rgba(219,39,119,.18);color:var(--other-t)}
.wempty{font-size:.72rem;color:var(--muted);padding:10px 8px;text-align:center}
.pro-gate{display:none;flex-direction:column;align-items:center;padding:64px 24px;text-align:center;gap:12px}
.pro-gate.on{display:flex}
.pgbadge{background:rgba(245,158,11,.15);color:var(--pro);font-size:.75rem;font-weight:700;padding:4px 12px;border-radius:6px;border:1px solid rgba(245,158,11,.3)}
.pro-gate h2{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--text)}
.pro-gate p{font-size:.88rem;color:var(--text2);max-width:320px;line-height:1.6}
.pgbtn{background:var(--pro);color:#0a0f1e;border:none;border-radius:10px;padding:12px 28px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;cursor:pointer}
.kbox{display:none;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:300px}
.kbox.on{display:flex}
.kinput{width:100%;background:var(--card);border:1px solid var(--border-hover);border-radius:10px;padding:11px 14px;font-size:.88rem;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;text-align:center}
.kinput:focus{border-color:var(--pro)}
.ksub{width:100%;background:var(--pro);color:#0a0f1e;border:none;border-radius:10px;padding:11px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;cursor:pointer}
.kerr{font-size:.78rem;color:#ef4444;display:none}
.kerr.on{display:block}
.overlay{display:none;position:fixed;inset:0;background:rgba(4,7,18,.85);z-index:200;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(8px)}
.overlay.on{display:flex}
.modal{background:var(--surface);border:1px solid var(--border-hover);border-radius:20px;padding:32px;width:100%;max-width:480px}
.mtop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.mtime{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--text);line-height:1}
.mdate{font-size:.8rem;color:var(--text2);margin-top:5px}
.xbtn{width:34px;height:34px;background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.xbtn:hover{background:var(--border-hover);color:var(--text)}
.mlabel{font-size:.78rem;font-weight:500;color:var(--text2);letter-spacing:.04em;margin-bottom:10px;text-transform:uppercase}
.cats{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.cpill{padding:6px 16px;border-radius:100px;font-size:.8rem;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2);transition:all .15s}
.cpill:hover{border-color:var(--border-hover);color:var(--text)}
.cpill.s-study{background:var(--study-bg);border-color:var(--study);color:var(--study-t)}
.cpill.s-rest{background:var(--rest-bg);border-color:var(--rest);color:var(--rest-t)}
.cpill.s-work{background:var(--work-bg);border-color:var(--work);color:var(--work-t)}
.cpill.s-chores{background:var(--chores-bg);border-color:var(--chores);color:var(--chores-t)}
.cpill.s-other{background:var(--other-bg);border-color:var(--other);color:var(--other-t)}
textarea{width:100%;min-height:120px;resize:vertical;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:.9rem;font-family:'DM Sans',sans-serif;color:var(--text);line-height:1.7;outline:none;margin-bottom:16px;transition:border-color .15s}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--muted)}
.macts{display:flex;gap:10px}
.sbtn{flex:1;background:#fff;color:#0a0f1e;border:none;border-radius:10px;padding:13px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.9rem;cursor:pointer}
.sbtn:hover{opacity:.9}
.cbtn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:10px;padding:13px 20px;font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;transition:all .15s}
.cbtn:hover{border-color:#ef4444;color:#ef4444}
@media(max-width:700px){.app{padding:24px 16px 60px}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.wgrid{grid-template-columns:repeat(3,minmax(0,1fr))}header{flex-direction:column;align-items:flex-start;gap:16px}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">DayDraft</div>
    <div class="tabs">
      <button class="tab active" id="tDaily" onclick="sw('daily')">Daily</button>
      <button class="tab" id="tWeekly" onclick="sw('weekly')">Weekly <span class="pro-badge">PRO</span></button>
    </div>
  </header>
  <div class="date-nav">
    <button onclick="sd(-1)">&#8592;</button>
    <span id="dateLabel">Loading...</span>
    <button onclick="sd(1)">&#8594;</button>
  </div>
  <div class="legend">
    <div class="li"><div class="ld" style="background:#2563eb"></div>Study</div>
    <div class="li"><div class="ld" style="background:#0d9488"></div>Rest</div>
    <div class="li"><div class="ld" style="background:#7c3aed"></div>Work</div>
    <div class="li"><div class="ld" style="background:#d97706"></div>Chores</div>
    <div class="li"><div class="ld" style="background:#db2777"></div>Other</div>
  </div>
  <div id="dailyView">
    <div class="grid" id="grid"></div>
    <div class="bbar">
      <p class="scount"><strong id="cnt">0</strong> slots planned</p>
      <button class="ebtn" onclick="expDay()">&#8595; Export</button>
    </div>
  </div>
  <div id="weeklyView">
    <div class="pro-gate on" id="pg">
      <div class="pgbadge">PRO FEATURE</div>
      <h2>Weekly Overview</h2>
      <p>See your entire week at a glance and spot patterns in how you spend your time.</p>
      <button class="pgbtn" id="ugbtn" onclick="showK()">Upgrade to Pro</button>
      <div class="kbox" id="kb">
        <input class="kinput" id="ki" placeholder="Enter license key" onkeydown="if(event.key==='Enter')subK()">
        <button class="ksub" onclick="subK()">Unlock</button>
        <span class="kerr" id="ke">Invalid key. Try again.</span>
      </div>
    </div>
    <div id="wc" style="display:none">
      <div class="wgrid" id="wg"></div>
      <div class="bbar">
        <p class="scount">Week of <strong id="wlabel"></strong></p>
        <button class="ebtn" onclick="expWeek()">&#8595; Export Week</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="ov" onclick="if(event.target===this)cm()">
  <div class="modal">
    <div class="mtop">
      <div><div class="mtime" id="mt"></div><div class="mdate" id="md"></div></div>
      <button class="xbtn" onclick="cm()">&#x2715;</button>
    </div>
    <div class="mlabel">Category</div>
    <div class="cats">
      <button class="cpill" data-c="study" onclick="pc('study')">Study</button>
      <button class="cpill" data-c="rest" onclick="pc('rest')">Rest</button>
      <button class="cpill" data-c="work" onclick="pc('work')">Work</button>
      <button class="cpill" data-c="chores" onclick="pc('chores')">Chores</button>
      <button class="cpill" data-c="other" onclick="pc('other')">Other</button>
    </div>
    <div class="mlabel">Plan</div>
    <textarea id="mi" placeholder="What do you want to do during this time?"></textarea>
    <div class="macts">
      <button class="sbtn" onclick="sv()">Save</button>
      <button class="cbtn" onclick="cl()">Clear</button>
    </div>
  </div>
</div>

<script>
var H=["5:00 AM","6:00 AM","7:00 AM","8:00 AM","9:00 AM","10:00 AM","11:00 AM","12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM","5:00 PM","6:00 PM","7:00 PM","8:00 PM","9:00 PM","10:00 PM","11:00 PM"];
var CL={study:'Study',rest:'Rest',work:'Work',chores:'Chores',other:'Other'};
var DN=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
var SD=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var cur=new Date();cur.setHours(0,0,0,0);
var ah=null,ac=null,pro=false,store={};

function dk(d){var m=d.getMonth()+1,dd=d.getDate();return d.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(dd<10?'0'+dd:dd);}
function sk(h){return dk(cur)+'|'+h;}
function fd(d){
  var t=new Date();t.setHours(0,0,0,0);
  var tm=new Date(t);tm.setDate(t.getDate()+1);
  if(d.getTime()===t.getTime()) return 'Today, '+MN[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
  if(d.getTime()===tm.getTime()) return 'Tomorrow, '+MN[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
  return DN[d.getDay()]+', '+MN[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
}
function sd(n){cur.setDate(cur.getDate()+n);ra();}
function sw(t){
  document.getElementById('tDaily').className='tab'+(t==='daily'?' active':'');
  document.getElementById('tWeekly').className='tab'+(t==='weekly'?' active':'');
  document.getElementById('dailyView').style.display=t==='daily'?'':'none';
  document.getElementById('weeklyView').style.display=t==='weekly'?'':'none';
  if(t==='weekly'&&pro){document.getElementById('pg').style.display='none';document.getElementById('wc').style.display='';rw();}
}
function ra(){
  document.getElementById('dateLabel').textContent=fd(cur);
  rg();uc();
}
function rg(){
  var g=document.getElementById('grid');
  g.innerHTML='';
  for(var i=0;i<H.length;i++){
    var h=H[i],s=store[sk(h)];
    var d=document.createElement('div');
    d.className='slot'+(s?' filled cat-'+s.c:'');
    d.setAttribute('data-h',h);
    d.innerHTML='<div class="sbar"></div><span class="stime">'+h+'</span><span class="spreview">'+(s?ex(s.t):'')+'</span><span class="stag">'+(s?CL[s.c]:'')+'</span>';
    d.onclick=om.bind(null,h);
    g.appendChild(d);
  }
}
function rw(){
  var mon=new Date(cur),day=mon.getDay();
  mon.setDate(mon.getDate()-(day===0?6:day-1));
  document.getElementById('wlabel').textContent=MN[mon.getMonth()].slice(0,3)+' '+mon.getDate();
  var g=document.getElementById('wg');g.innerHTML='';
  var tod=new Date();tod.setHours(0,0,0,0);
  for(var i=0;i<7;i++){
    var d=new Date(mon);d.setDate(mon.getDate()+i);
    var it=d.getTime()===tod.getTime();
    var c=document.createElement('div');c.className='wcol'+(it?' today':'');
    var pre=dk(d)+'|';
    var tasks=[];
    for(var k in store){if(k.indexOf(pre)===0)tasks.push(store[k]);}
    c.innerHTML='<div class="wch"><div class="wdn">'+SD[d.getDay()]+'</div><div class="wdd">'+d.getDate()+'</div></div>';
    var b=document.createElement('div');b.className='wcb';
    if(!tasks.length){b.innerHTML='<div class="wempty">No plans</div>';}
    else{for(var j=0;j<Math.min(tasks.length,6);j++){var tw=document.createElement('div');tw.className='wtask cat-'+tasks[j].c;tw.textContent=tasks[j].t;b.appendChild(tw);}}
    c.appendChild(b);g.appendChild(c);
  }
}
function showK(){document.getElementById('ugbtn').style.display='none';document.getElementById('kb').className='kbox on';document.getElementById('ki').focus();}
function subK(){
  var v=document.getElementById('ki').value.trim().toUpperCase();
  if(v==='DAYDRAFT-PRO'){
    pro=true;
    document.getElementById('pg').style.display='none';
    document.getElementById('wc').style.display='';
    rw();
  } else {
    document.getElementById('ke').className='kerr on';
    document.getElementById('ki').value='';
    document.getElementById('ki').focus();
  }
}
function om(h){
  ah=h;var s=store[sk(h)];
  document.getElementById('mt').textContent=h;
  document.getElementById('md').textContent=fd(cur);
  document.getElementById('mi').value=s?s.t:'';
  ac=s?s.c:null;rp();
  document.getElementById('ov').className='overlay on';
  setTimeout(function(){document.getElementById('mi').focus();},100);
}
function cm(){document.getElementById('ov').className='overlay';ah=null;}
function pc(c){ac=ac===c?null:c;rp();}
function rp(){
  var pills=document.querySelectorAll('.cpill');
  for(var i=0;i<pills.length;i++){
    pills[i].className='cpill'+(pills[i].getAttribute('data-c')===ac?' s-'+ac:'');
  }
}
function sv(){
  if(!ah)return;
  var t=document.getElementById('mi').value.trim();
  var k=sk(ah);
  if(t)store[k]={t:t,c:ac||'other'};
  else delete store[k];
  rg();uc();cm();
}
function cl(){if(!ah)return;delete store[sk(ah)];rg();uc();cm();}
function uc(){
  var pre=dk(cur)+'|',n=0;
  for(var k in store){if(k.indexOf(pre)===0)n++;}
  document.getElementById('cnt').textContent=n;
}
function expDay(){
  var pre=dk(cur)+'|',out='DayDraft - '+fd(cur)+'\n'+'-----------------------------------\n\n',any=false;
  for(var i=0;i<H.length;i++){var s=store[pre+H[i]];if(s){any=true;out+=H[i]+'  ['+CL[s.c]+']\n'+s.t+'\n\n';}}
  if(!any)out+='No plans for this day.\n';
  dl(out,'daydraft-'+dk(cur)+'.txt');
}
function expWeek(){
  var mon=new Date(cur),day=mon.getDay();
  mon.setDate(mon.getDate()-(day===0?6:day-1));
  var out='DayDraft - Week of '+MN[mon.getMonth()]+' '+mon.getDate()+'\n'+'-----------------------------------\n\n';
  for(var i=0;i<7;i++){
    var d=new Date(mon);d.setDate(mon.getDate()+i);
    var pre=dk(d)+'|',tasks=[];
    for(var k in store){if(k.indexOf(pre)===0)tasks.push({h:k.split('|')[1],s:store[k]});}
    out+=SD[d.getDay()]+' '+d.getDate()+'\n';
    if(!tasks.length)out+='  No plans\n';
    else for(var j=0;j<tasks.length;j++)out+='  '+tasks[j].h+' ['+CL[tasks[j].s.c]+'] '+tasks[j].s.t+'\n';
    out+='\n';
  }
  dl(out,'daydraft-week.txt');
}
function dl(txt,fn){
  var a=document.createElement('a');
  a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(txt);
  a.download=fn;a.click();
}
function ex(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

ra();
</script>
</body>
</html>
